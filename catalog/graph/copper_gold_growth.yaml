model_id: copper_gold_growth
name: "Copper/gold ratio (growth vs fear)"
family: commodity
persona: commodity_analyst
grounded_in: [gorton-rouwenhorst-facts]
method: data-direct
method_note: >
  The copper/gold ratio is a directly-observed relative price: copper is cyclical industrial demand
  ('Dr. Copper'), gold is the monetary/fear bid. Their ratio is a widely-watched growth-vs-safety
  gauge that co-moves with the 10y Treasury yield — a real, documented cross-asset relationship
  (Gorton-Rouwenhorst commodity fundamentals; the metal complex as a macro read). An observed ratio,
  not a fitted model and not a z-average.
spec:
  equations: "copper/gold x1000. Rising = cyclical growth priced over safety; historically tracks the 10y yield."
history: {start: "2010-01", end: "2026-07", cadence: monthly}
inputs:
  - {id: copper, series_id: "HG=F", db_source: yahoo, state: level, context_window: 252}
  - {id: gold, series_id: "GC=F", db_source: yahoo, state: level, context_window: 252}
  - {id: silver, series_id: "SI=F", db_source: yahoo, state: level, context_window: 252}
  - {id: y10, series_id: "DGS10", db_source: fred, state: level, context_window: 252}
execution:
  implemented_by: unified_market_data.analysis.commodity_analytics.copper_gold_ratio
  args: {copper: copper.level, gold: gold.level}
outputs:
  - {name: ratio, unit: "x1000", meaning: "copper/gold x1000 — the growth-vs-fear signal"}
interpretations:
  - id: growth_optimism
    when: "ratio > 1.6"
    says: >
      The copper/gold ratio is elevated — the metal complex is pricing cyclical growth over safety.
      Because the ratio co-moves with the 10y yield, an elevated reading is the commodity market
      agreeing with a higher-growth, higher-rates world.
  - id: fear_bid
    when: "ratio < 1.3"
    says: >
      Copper is falling relative to gold — the safety/monetary bid is winning over industrial demand,
      the metal-complex signature of a growth scare (2011-12, 2015-16, 2020) and typically falling yields.
charts:
  - id: "Copper vs gold (the two legs, standardized)"
    role: input
    chart_type: series
    color_job: categorical
    insight: "the ratio's two legs — cyclical demand (copper) against the safety/inflation bid (gold); the ratio rises when copper outruns gold"
    data_contract:
      kind: series
      ylabel: "z-score"
      zero_line: true
      series:
        - {label: "copper z", from: "input:copper.zscore"}
        - {label: "gold z", from: "input:gold.zscore"}
  - id: "The copper/gold ratio (growth signal)"
    role: outcome
    chart_type: series
    color_job: sequential
    interpretation: growth_optimism
    insight: "the market's growth-vs-fear read through time — the 2011 and 2020 troughs are growth scares, the 2021 and 2024-25 rebuilds are reflation"
    data_contract:
      kind: series
      ylabel: "copper/gold x1000"
      series:
        - {label: "copper/gold", from: "output:ratio"}
  - id: "Copper vs the 10y yield (the documented link)"
    role: consequence
    chart_type: series
    color_job: categorical
    insight: "copper — the growth leg — tracks the 10y Treasury yield closely; when they diverge, one market is mispricing growth and the gap tends to close"
    data_contract:
      kind: series
      ylabel: "z-score"
      zero_line: true
      series:
        - {label: "copper z", from: "input:copper.zscore"}
        - {label: "10y yield z", from: "input:y10.zscore"}
  - id: "Metals today"
    role: outcome
    chart_type: bar
    color_job: diverging
    insight: "the current standardized level of each metal — copper (industrial), gold and silver (precious)"
    data_contract:
      kind: named_values
      ylabel: "z-score"
      labels: ["copper", "gold", "silver"]
      values: ["input:copper.zscore", "input:gold.zscore", "input:silver.zscore"]
