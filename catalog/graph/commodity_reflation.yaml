model_id: commodity_reflation
name: "Commodity reflation breadth (energy / metals / ags)"
family: commodity
persona: commodity_analyst
grounded_in: [gorton-rouwenhorst-facts, nber-commodity-futures]
spec:
  equations: "reflation = mean(energy_z, metals_z, ags_z) — broad commodity inflation pressure"
history: {start: "2025-08-01", end: "2026-07-09", cadence: weekly}
inputs:
  - {id: crude, series_id: "CL=F", db_source: yahoo, state: zscore, context_window: 250}
  - {id: copper, series_id: "HG=F", db_source: yahoo, state: zscore, context_window: 250}
  - {id: corn, series_id: "ZC=F", db_source: yahoo, state: zscore, context_window: 250}
execution:
  implemented_by: unified_market_data.analysis.commodity_analytics.reflation_signal
  args: {energy_z: crude.zscore, metals_z: copper.zscore, ags_z: corn.zscore}
outputs:
  - {name: reflation, unit: "sigma", meaning: "broad commodity reflation breadth; >0 inflation pressure building"}
interpretations:
  - id: reflating
    when: "reflation > 0.5"
    says: "Energy, metals and ags are firming together — broad commodity reflation, a warning for goods inflation."
charts:
  - id: "Commodity reflation breadth"
    chart_type: series
    color_job: diverging
    interpretation: reflating
    insight: "whether the whole complex is inflating together, through time"
    data_contract:
      kind: series
      ylabel: "reflation (sigma)"
      zero_line: true
      series:
        - {label: "reflation breadth", from: "output:reflation"}
  - id: "The three legs (energy / metals / ags)"
    chart_type: series
    color_job: categorical
    insight: "which part of the complex is driving — do they agree?"
    data_contract:
      kind: series
      ylabel: "z-score"
      zero_line: true
      series:
        - {label: "energy (crude)", from: "input:crude.zscore"}
        - {label: "metals (copper)", from: "input:copper.zscore"}
        - {label: "ags (corn)", from: "input:corn.zscore"}
  - id: "Energy vs metals (the cyclical pair)"
    chart_type: series
    color_job: categorical
    insight: "oil and copper together is the cleanest demand signal"
    data_contract:
      kind: series
      ylabel: "z-score"
      zero_line: true
      series:
        - {label: "crude z", from: "input:crude.zscore"}
        - {label: "copper z", from: "input:copper.zscore"}
  - id: "Reflation legs today"
    chart_type: bar
    color_job: diverging
    insight: "the current standardized level of each complex leg"
    data_contract:
      kind: named_values
      ylabel: "z-score"
      labels: ["energy", "metals", "ags"]
      values: ["input:crude.zscore", "input:copper.zscore", "input:corn.zscore"]
