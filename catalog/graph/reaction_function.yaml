model_id: reaction_function
name: "Taylor-rule reaction function"
family: rates
persona: central_bank_policymaker
grounded_in: [taylor-1993-rule, hlw-natural-rate]
method: published
method_note: "Taylor (1993) rule variants — the actual equation"
spec:
  equations: "i* = r* + pi + 0.5(pi - pi*) + 0.5*gap ; inertial i_t = rho*i_{t-1} + (1-rho)*i*"
  params: {r_star_pct: 0.7, inflation_target_pct: 2.0}
history: {start: "2021-01", end: "2026-05"}
inputs:
  - {id: cpi, series_id: PCEPILFE, db_source: fred, transform: yoy, state: level, context_window: 36}
  - {id: real_gdp, series_id: GDPC1, db_source: fred, state: level}
  - {id: potential_gdp, series_id: GDPPOT, db_source: fred, state: level, as_of_from: real_gdp}
  - {id: policy, series_id: FEDFUNDS, db_source: fred, state: level}
  - id: gap
    source: derived
    compute:
      fn: unified_market_data.analysis.reaction_function.output_gap_pct
      args: {gdp: real_gdp.level, potential_gdp: potential_gdp.level}
execution:
  implemented_by: unified_market_data.analysis.reaction_function.taylor_variants
  args: {inflation_pct: cpi.level, output_gap_pct_: gap, prev_rate: policy.level}
outputs:
  - {name: taylor_1993, unit: "%", meaning: "1993-rule prescribed policy rate"}
  - {name: balanced_approach, unit: "%", meaning: "balanced-approach rule (2x gap weight)"}
  - {name: inertial, unit: "%", meaning: "inertial (smoothed) rule"}
interpretations:
  - id: behind_the_curve
    when: "taylor_1993 - policy.level > 1.0"
    says: "Policy sits more than 100bp below the 1993 rule — the Fed is running easier than the rule prescribes."
charts:
  - id: "The model's inputs — inflation & the output gap"
    role: input
    chart_type: series
    color_job: categorical
    insight: "the two state variables the rule ingests: core PCE inflation and the output gap"
    data_contract:
      kind: series
      ylabel: "%"
      zero_line: true
      series:
        - {label: "core PCE YoY", from: "input:cpi.level"}
        - {label: "output gap", from: "input:gap"}
  - id: "The inputs as §10 STATES — inflation momentum & acceleration"
    role: input
    chart_type: series
    color_job: diverging
    insight: "inflation is not a level but a state: its direction (1st derivative) and acceleration (2nd) change the prescription's trajectory"
    data_contract:
      kind: series
      ylabel: "pp (3m change / change-in-change)"
      zero_line: true
      series:
        - {label: "inflation momentum (Δ)", from: "input:cpi.direction"}
        - {label: "inflation acceleration (ΔΔ)", from: "input:cpi.acceleration"}
  - id: "The rule's outcome — the prescription fan"
    role: outcome
    chart_type: series
    color_job: categorical
    interpretation: behind_the_curve
    insight: "what Taylor (1993) and its variants prescribe from those inputs, vs where the Fed actually set policy"
    data_contract:
      kind: series
      ylabel: "policy rate (%)"
      series:
        - {label: "Taylor '93", from: "output:taylor_1993"}
        - {label: "Balanced-approach", from: "output:balanced_approach"}
        - {label: "Inertial rule", from: "output:inertial"}
        - {label: "Fed funds (actual)", from: "input:policy.level", style: dashed}
  - id: "The consequence — how far the Fed is from its own rule"
    role: consequence
    chart_type: gap_series
    color_job: diverging
    interpretation: behind_the_curve
    insight: "the prescription-minus-actual gap IS the trade: a Fed running below the rule is the case to be short duration"
    data_contract:
      kind: gap_series
      ylabel: "percentage points"
      label: "Taylor '93 - funds"
      minuend: "output:taylor_1993"
      subtrahend: "input:policy.level"
