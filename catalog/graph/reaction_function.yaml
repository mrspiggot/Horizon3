model_id: reaction_function
name: "Taylor-rule reaction function (cross-country)"
family: rates
persona: central_bank_policymaker
grounded_in: [taylor-1993-rule, hlw-natural-rate]
method: published
method_note: >
  Taylor (1993) rule variants — the actual equation, run jurisdiction-generically. Where the US-welded
  version bootstrapped the activity term from GDPC1/GDPPOT, this version binds the OECD Economic Outlook
  OUTPUT GAP directly (a published estimate, not an LLM number), so the same rule runs for the Fed, ECB,
  BoE and BoJ. Inflation is headline CPI year-on-year — the measure the ECB (HICP) and BoE (CPI) actually
  target at 2%, and a consistent cross-country gauge (the canonical Fed formulation uses core PCE). All
  four majors share the 2% target. The neutral real rate r* is held at a common ~0.7% as a documented
  simplification; a country-specific r* (Holston-Laubach-Williams) is the next data tier. The article's
  headline output — the prescription MINUS the actual rate — is directionally robust to r*: it is what
  flags, e.g., the BoJ as the standout running far below any reaction function.
spec:
  equations: "i* = r* + pi + 0.5(pi - pi*) + 0.5*gap ; inertial i_t = rho*i_{t-1} + (1-rho)*i*"
  params: {r_star_pct: 0.7, inflation_target_pct: 2.0}
history: {start: "1960-01", end: "2026-06"}
instances: [US, EU, GB, JP]
inputs:
  - {id: cpi,    role: headline_cpi, transform: yoy, state: level, context_window: 36}
  - {id: gap,    role: output_gap,                   state: level, context_window: 40}
  - {id: policy, role: policy_rate,                  state: level}
execution:
  implemented_by: unified_market_data.analysis.reaction_function.taylor_variants
  args: {inflation_pct: cpi.level, output_gap_pct_: gap.level, prev_rate: policy.level}
outputs:
  - {name: taylor_1993, unit: "%", meaning: "1993-rule prescribed policy rate"}
  - {name: balanced_approach, unit: "%", meaning: "balanced-approach rule (2x gap weight)"}
  - {name: inertial, unit: "%", meaning: "inertial (smoothed) rule"}
interpretations:
  - id: behind_the_curve
    when: "taylor_1993 - policy.level > 1.0"
    says: "Policy sits more than 100bp below the 1993 rule — the central bank is running easier than the rule prescribes."
  - id: ahead_of_the_curve
    when: "policy.level - taylor_1993 > 1.0"
    says: "Policy sits more than 100bp above the 1993 rule — the central bank is running tighter than the rule prescribes."
charts:
  - id: "The model's inputs — inflation & the output gap"
    role: input
    chart_type: series
    color_job: categorical
    insight: "the two state variables the rule ingests: headline inflation and the OECD output gap"
    data_contract:
      kind: series
      ylabel: "%"
      zero_line: true
      series:
        - {label: "headline inflation YoY", from: "input:cpi.level"}
        - {label: "output gap", from: "input:gap.level"}
  - id: "The inputs as §10 STATES — inflation momentum & acceleration"
    role: input
    chart_type: series
    color_job: diverging
    insight: "inflation is not a level but a state: its direction (1st derivative) and acceleration (2nd) change the prescription's trajectory"
    data_contract:
      kind: series
      ylabel: "pp (3m change / change-in-change)"
      zero_line: true
      series:
        - {label: "inflation momentum (Δ)", from: "input:cpi.direction"}
        - {label: "inflation acceleration (ΔΔ)", from: "input:cpi.acceleration"}
  - id: "The rule's outcome — the prescription fan"
    role: outcome
    chart_type: series
    color_job: categorical
    interpretation: behind_the_curve
    insight: "what Taylor (1993) and its variants prescribe from those inputs, vs where the central bank actually set policy"
    data_contract:
      kind: series
      ylabel: "policy rate (%)"
      series:
        - {label: "Taylor '93", from: "output:taylor_1993"}
        - {label: "Balanced-approach", from: "output:balanced_approach"}
        - {label: "Inertial rule", from: "output:inertial"}
        - {label: "Policy rate (actual)", from: "input:policy.level", style: dashed}
  - id: "The consequence — how far the central bank is from its own rule"
    role: consequence
    chart_type: gap_series
    color_job: diverging
    interpretation: behind_the_curve
    insight: "the prescription-minus-actual gap IS the trade: a central bank running below the rule is the case to be short duration"
    pos_label: "Policy BELOW the rule (easier than prescribed)"
    neg_label: "Policy ABOVE the rule (tighter than prescribed)"
    data_contract:
      kind: gap_series
      ylabel: "percentage points"
      label: "Taylor '93 - policy"
      minuend: "output:taylor_1993"
      subtrahend: "input:policy.level"
