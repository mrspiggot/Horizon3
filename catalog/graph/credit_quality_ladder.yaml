model_id: credit_quality_ladder
name: "Credit quality ladder (IG / HY / EM OAS)"
family: credit
persona: credit_investor
grounded_in: [longstaff-credit-spreads]
method: data-direct
method_note: "the published ICE BofA OAS quality ladder"
spec:
  equations: "the OAS compensation ladder across quality; HY-IG = the down-in-quality premium"
history: {start: "2025-07-10", end: "2026-07-09", cadence: weekly}
inputs:
  - {id: ig, series_id: BAMLC0A0CM, db_source: fred, state: level, context_window: 120}
  - {id: hy, series_id: BAMLH0A0HYM2, db_source: fred, state: level, context_window: 120}
  - {id: em, series_id: BAMLEMCBPIOAS, db_source: fred, state: level, context_window: 120}
execution:
  implemented_by: unified_market_data.analysis.credit_analytics.credit_ladder
  args: {ig: ig.level, hy: hy.level, em: em.level}
outputs:
  - {name: ig, unit: "%", meaning: "IG OAS"}
  - {name: em, unit: "%", meaning: "EM corporate OAS"}
  - {name: hy, unit: "%", meaning: "HY OAS"}
  - {name: hy_ig, unit: "%", meaning: "HY minus IG — the down-in-quality premium"}
interpretations:
  - id: quality_compressed
    when: "hy_ig < 2.0"
    says: "The HY-IG premium is thin — investors are paid little to move down in quality; complacency."
charts:
  - id: "The credit spread ladder (quality x time)"
    chart_type: heatmap
    color_job: sequential
    interpretation: quality_compressed
    insight: "the whole quality ladder across the year — where and when spread stress hit each rung"
    data_contract:
      kind: heatmap
      cbar_label: "OAS (%)"
      rows:
        - {label: "IG", from: "output:ig"}
        - {label: "EM", from: "output:em"}
        - {label: "HY", from: "output:hy"}
  - id: "The spread curve: now vs 3 months ago"
    chart_type: curve_snapshot
    color_job: categorical
    insight: "the spread paid at each quality rung and how it shifted over the quarter"
    data_contract:
      kind: curve_snapshot
      ylabel: "OAS (%)"
      xlabel: "quality"
      tenor_labels: ["IG", "EM", "HY"]
      refs: ["output:ig", "output:em", "output:hy"]
      lookbacks:
        - {label: "now", k: 0, style: solid}
        - {label: "3 months ago", k: 13, style: faded}
  - id: "The down-in-quality premium (HY - IG)"
    chart_type: gap_series
    color_job: diverging
    interpretation: quality_compressed
    insight: "how much extra spread HY pays over IG — the risk-appetite gauge"
    data_contract:
      kind: gap_series
      ylabel: "percentage points"
      label: "HY - IG"
      minuend: "output:hy"
      subtrahend: "output:ig"
  - id: "The ladder today"
    chart_type: bar
    color_job: sequential
    insight: "the current OAS at each quality rung"
    data_contract:
      kind: named_values
      ylabel: "OAS (%)"
      labels: ["IG", "EM", "HY"]
      values: ["output:ig", "output:em", "output:hy"]
