model_id: funding_cost
name: "All-in funding cost (risk-free + credit)"
family: credit
persona: corporate_treasurer
grounded_in: [longstaff-credit-spreads]
method: data-direct
low_dimensional_exception: true   # all-in funding is definitionally two legs: risk-free + credit spread
method_note: >
  The all-in fixed funding cost a treasurer actually pays = the risk-free term rate + the credit
  spread (Longstaff et al.: the spread is the market price of the issuer's default risk). The credit
  leg is the Moody's Baa corporate spread (BAA10Y), which runs deep to the 1990s and covers the GFC,
  ZIRP and the 2022 repricing. A definitional decomposition of two observed market rates.
spec:
  equations: "all_in = DGS5 (5Y risk-free) + BAA10Y (Baa credit spread). Decompose to see rates vs credit."
history: {start: "1986-01", end: "2026-07", cadence: monthly}
inputs:
  - {id: rf, series_id: DGS5, db_source: fred, state: level, context_window: 60}
  - {id: ig, series_id: BAA10Y, db_source: fred, state: level, context_window: 60}
execution:
  implemented_by: unified_market_data.analysis.treasury_analytics.funding_cost
  args: {risk_free_pct: rf.level, credit_oas_pct: ig.level}
outputs:
  - {name: all_in_pct, unit: "%", meaning: "all-in fixed IG funding cost"}
  - {name: risk_free_pct, unit: "%", meaning: "5Y risk-free component"}
  - {name: credit_oas_pct, unit: "%", meaning: "Baa credit spread component (BAA10Y)"}
interpretations:
  - id: rates_driven
    when: "risk_free_pct > 3.5"
    says: >
      The funding cost is dominated by the risk-free rate, not credit — a rates story. When the
      risk-free leg rather than the spread drives the all-in cost, it is a treasurer's problem the company
      cannot fix by improving its own credit, only by timing duration or funding floating.
  - id: credit_driven
    when: "credit_oas_pct > 2.7"
    says: >
      The credit spread is the large component — a company-credit story (2011, 2016, 2020). Here the
      all-in cost is about the market's price of default risk, which better issuers can out-run.
charts:
  - id: "Rates vs credit — what is driving the cost"
    role: input
    chart_type: series
    color_job: categorical
    insight: "the two legs of the all-in cost decomposed — is funding moving on the risk-free rate or the credit spread? Post-2022 it is overwhelmingly rates"
    data_contract:
      kind: series
      ylabel: "%"
      zero_line: true
      series:
        - {label: "risk-free (5Y)", from: "output:risk_free_pct"}
        - {label: "IG credit spread", from: "output:credit_oas_pct"}
  - id: "All-in funding cost over time"
    role: outcome
    chart_type: series
    color_job: sequential
    interpretation: rates_driven
    insight: "the treasurer's all-in cost of fixed funding through the cycle — the ZIRP era, the 2022 repricing, and today"
    data_contract:
      kind: series
      ylabel: "all-in funding (%)"
      series:
        - {label: "all-in IG funding", from: "output:all_in_pct"}
  - id: "The credit-risk component (compensation for default)"
    role: consequence
    chart_type: gap_series
    color_job: diverging
    interpretation: credit_driven
    pos_label: "credit-risk cost"
    neg_label: ""
    insight: "the part of funding that is the market's price of the firm's default risk — it spikes in stress (2011, 2016, 2020) independent of the risk-free rate"
    data_contract:
      kind: gap_series
      ylabel: "IG OAS (%)"
      label: "credit spread"
      minuend: "output:credit_oas_pct"
  - id: "The funding stack today"
    role: outcome
    chart_type: bar
    color_job: sequential
    insight: "the current split of the all-in cost into rates and credit"
    data_contract:
      kind: named_values
      ylabel: "%"
      labels: ["risk-free", "IG spread", "all-in"]
      values: ["output:risk_free_pct", "output:credit_oas_pct", "output:all_in_pct"]
  - id: "What a treasurer actually pays, decomposed"
    role: outcome
    chart_type: decomposition
    color_job: sequential
    insight: "the all-in fixed funding cost split into the risk-free rate and the credit spread — since 2022 it is the risk-free leg, not credit, driving a cost the firm cannot fix by improving its own rating"
    data_contract:
      kind: decomposition
      title: "What a corporate treasurer actually pays for fixed funding"
      subtitle: "The all-in IG funding cost, decomposed into the two legs a treasurer faces — the 5-year risk-free rate\nand the Baa credit spread. Which leg is moving decides whether the firm can do anything about it."
      ylabel: "Contribution to the all-in fixed funding cost  (%)"
      unit: "%"
      components:
        - {label: "Risk-free rate  (5Y Treasury)", from: "output:risk_free_pct", tone: neutral}
        - {label: "Credit spread  (Baa, default risk)", from: "output:credit_oas_pct", tone: warm}
      net: {label: "All-in funding cost", from: "output:all_in_pct"}
      callouts:
        - {text: "2020: the jump is the CREDIT leg (red) —\nthe market repricing default risk, not rates", at: "2020-05", to_y: 3.8, from: "2011-06", from_y: 7.6}
        - {text: "2022–23: the RISK-FREE leg (grey) drove the\ncost up — a treasurer cannot fix this by\nimproving the firm's own credit", at: "2023-06", to_y: 1.8, from: "2011-06", from_y: 5.3}
      source: "Decomposition: all-in funding = 5Y risk-free (DGS5) + Baa credit spread (BAA10Y). Source: FRED."
