model_id: real_funding
name: "Real cost of debt (funding vs inflation)"
family: credit
persona: corporate_treasurer
grounded_in: [hatzius-fci]
spec:
  equations: "real funding = (risk-free + IG OAS) - expected inflation (10y breakeven)"
history: {start: "2025-08-01", end: "2026-07-09", cadence: weekly}
inputs:
  - {id: rf, series_id: DGS5, db_source: fred, state: level, context_window: 250}
  - {id: ig, series_id: BAMLC0A0CM, db_source: fred, state: level, context_window: 250}
  - {id: breakeven, series_id: T10YIE, db_source: fred, state: level, context_window: 250}
execution:
  implemented_by: unified_market_data.analysis.treasury_analytics.real_funding_cost
  args: {risk_free_pct: rf.level, credit_oas_pct: ig.level, breakeven_pct: breakeven.level}
outputs:
  - {name: real_funding, unit: "%", meaning: "real all-in funding cost (nominal - expected inflation)"}
interpretations:
  - id: real_squeeze
    when: "real_funding > 2.5"
    says: "The real cost of debt is high — even after inflation, funding is expensive; a case to wait or shorten."
charts:
  - id: "Real cost of debt"
    chart_type: series
    color_job: diverging
    interpretation: real_squeeze
    insight: "the all-in funding cost after inflation — the true cost of borrowing"
    data_contract:
      kind: series
      ylabel: "real funding (%)"
      zero_line: true
      series:
        - {label: "real all-in funding", from: "output:real_funding"}
  - id: "Nominal funding vs expected inflation"
    chart_type: series
    color_job: categorical
    insight: "the wedge between nominal funding and breakevens is the real cost"
    data_contract:
      kind: series
      ylabel: "%"
      series:
        - {label: "risk-free (5Y)", from: "input:rf.level"}
        - {label: "10y breakeven", from: "input:breakeven.level"}
  - id: "Expected inflation (the deflator)"
    chart_type: series
    color_job: diverging
    insight: "the breakeven inflation that turns nominal funding into real"
    data_contract:
      kind: series
      ylabel: "breakeven (%)"
      series:
        - {label: "10y breakeven", from: "input:breakeven.level"}
  - id: "The real-cost build today"
    chart_type: bar
    color_job: diverging
    insight: "risk-free + credit minus inflation = the real cost"
    data_contract:
      kind: named_values
      ylabel: "%"
      labels: ["risk-free", "IG spread", "-breakeven", "real"]
      values: ["input:rf.level", "input:ig.level", "input:breakeven.level", "output:real_funding"]
