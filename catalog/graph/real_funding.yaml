model_id: real_funding
name: "Real cost of debt (the Fisher equation)"
family: credit
persona: corporate_treasurer
grounded_in: [fisher-1930-interest]
method: published
method_note: >
  The Fisher (1930) relation: real rate = nominal rate - expected inflation. Applied to corporate
  funding, the real all-in cost = (risk-free + credit OAS) - 10y breakeven inflation. It separates a
  nominal-rate squeeze from a real one — high nominal funding amid high inflation can be cheap in real
  terms. Observed inputs, published identity.
spec:
  equations: "real_funding = (DGS5 + BAA10Y) - T10YIE  (Fisher: real = nominal - expected inflation)"
history: {start: "2003-01", end: "2026-07", cadence: monthly}
inputs:
  - {id: rf, series_id: DGS5, db_source: fred, state: level, context_window: 60}
  - {id: ig, series_id: BAA10Y, db_source: fred, state: level, context_window: 60}
  - {id: breakeven, series_id: T10YIE, db_source: fred, state: level, context_window: 60}
execution:
  implemented_by: unified_market_data.analysis.treasury_analytics.real_funding_cost
  args: {risk_free_pct: rf.level, credit_oas_pct: ig.level, breakeven_pct: breakeven.level}
outputs:
  - {name: real_funding, unit: "%", meaning: "real all-in funding cost (Fisher: nominal - expected inflation)"}
interpretations:
  - id: real_squeeze
    when: "real_funding > 2.0"
    says: >
      The real cost of debt is high — even after inflation, funding is genuinely expensive. This is
      what it looks like when nominal rates outrun breakevens: the Fisher-real burden lands on the
      issuer — a case to wait, shorten, or fund floating.
  - id: cheap_funding
    when: "real_funding < 1.0"
    says: >
      Real funding is near zero — after expected inflation, the all-in cost of debt is close to free.
      The 2021 issuer's paradise: even including the credit spread, the Fisher-real burden was the
      lowest on record, the moment to borrow long and lock it in.
charts:
  - id: "Nominal funding vs expected inflation"
    role: input
    chart_type: decomposition
    color_job: diverging
    insight: "the Fisher decomposition — the risk-free rate plus the Baa credit spread, less 10y breakeven inflation, nets to the real cost of debt; high inflation compensation is what keeps the real cost low"
    data_contract:
      kind: decomposition
      title: "The real cost of debt, decomposed (Fisher)"
      subtitle: "A treasurer's all-in funding — the 5-year risk-free rate plus the Baa credit spread — less the 10-year\nbreakeven inflation that erodes it. What remains (the dashed line) is the real cost of debt actually borne."
      ylabel: "Contribution to the real cost of debt  (%)"
      unit: "%"
      components:
        - {label: "Risk-free rate  (5Y)", from: "input:rf.level", tone: neutral}
        - {label: "Credit spread  (Baa)", from: "input:ig.level", tone: amber}
        - {label: "Less: expected inflation  (10y breakeven)", from: "input:breakeven.level", tone: warm, sign: -1}
      net: {label: "Real cost of debt", from: "output:real_funding"}
  - id: "The real cost of debt over time"
    role: outcome
    chart_type: series
    color_job: sequential
    insight: "the Fisher-real all-in funding cost — the true burden on the balance sheet, through time"
    data_contract:
      kind: series
      ylabel: "real funding (%)"
      zero_line: true
      series:
        - {label: "real all-in funding", from: "output:real_funding"}
  - id: "The real-funding cycle"
    role: consequence
    chart_type: gap_series
    color_job: diverging
    interpretation: real_squeeze
    pos_label: "real cost of debt"
    neg_label: ""
    # Dated, for the reason policy_stance's caption was: undated, the last clause reads as a claim
    # about NOW. The climb is real and it was the heaviest since the GFC — it peaked at 4.22 in
    # 2023-10 and has eased to 3.64 since, and a caption that stops at the peak tells half the chart.
    insight: "the real burden through the cycle — a deflation-driven spike in 2008, a slide to near-zero (cheapest real funding on record) by 2021, then the post-2022 climb to a 2023 peak, the heaviest since the GFC, easing since"
    data_contract:
      kind: gap_series
      ylabel: "real funding (%)"
      label: "real all-in funding"
      minuend: "output:real_funding"
  - id: "The real-cost build today"
    role: outcome
    chart_type: bar
    color_job: diverging
    insight: "risk-free + credit spread minus expected inflation = the real cost, decomposed"
    data_contract:
      kind: named_values
      ylabel: "%"
      labels: ["risk-free", "IG spread", "-breakeven", "real"]
      values: ["input:rf.level", "input:ig.level", "input:breakeven.level", "output:real_funding"]
