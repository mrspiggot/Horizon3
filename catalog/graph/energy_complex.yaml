model_id: energy_complex
name: "Energy complex — real price, location spread, and oil-vs-gas"
family: commodity
persona: commodity_analyst
grounded_in: [gorton-rouwenhorst-facts, nber-commodity-futures]
method: data-direct
method_note: >
  Four analytic reads of the energy complex from spot benchmarks (Gorton-Hayashi-Rouwenhorst commodity
  fundamentals), each requiring computation a quoted price cannot give: crude deflated to constant
  dollars, the Brent-WTI location premium, the crude-to-gas relative price, and 12-month time-series
  momentum (Moskowitz-Ooi-Pedersen 2012). Deep FRED benchmarks (WTI/Brent/Henry Hub daily from 2000,
  CPI monthly) rather than the thin Yahoo futures.
spec:
  equations: >
    real_wti = WTI x (CPI_now / CPI_t);  Brent-WTI = Brent - WTI ($/bbl);
    oil_gas = WTI / HenryHub;  momentum = 12m trailing return of WTI (%).
history: {start: "1997-01", end: "2026-07", cadence: monthly}
inputs:
  # Deep FRED daily benchmarks (2000→present) — WTI, Brent, Henry Hub — plus CPI for real terms.
  - {id: crude,    series_id: "DCOILWTICO",   db_source: fred, state: level, context_window: 252}
  - {id: brent,    series_id: "DCOILBRENTEU", db_source: fred, state: level, context_window: 252}
  - {id: natgas,   series_id: "DHHNGSP",      db_source: fred, state: level, context_window: 252}
  - {id: cpi,      series_id: "CPIAUCSL",     db_source: fred, state: level, context_window: 252}
  - {id: crude_mom, series_id: "DCOILWTICO",  db_source: fred, transform: momentum, state: level, context_window: 252}
execution:
  implemented_by: unified_market_data.analysis.commodity_analytics.energy_complex
  args: {brent: brent.level, wti: crude.level, natgas: natgas.level, cpi: cpi.level}
outputs:
  - {name: brent_wti_spread, unit: "$/bbl", meaning: "Brent minus WTI — the location/quality spread"}
  - {name: real_wti, unit: "$", meaning: "WTI deflated to ~current dollars (CPI-adjusted)"}
  - {name: oil_gas_ratio, unit: "ratio", meaning: "WTI ($/bbl) / Henry Hub ($/MMBtu) — crude-to-gas relative price"}
interpretations:
  - id: brent_premium
    when: "brent_wti_spread > 4"
    says: >
      Brent trades well above WTI — a wide location premium. The shale-era signature: abundant
      landlocked US crude priced below waterborne Brent when export capacity binds (2011-2014), the
      structural spread that made US pipeline and export infrastructure a decade-long trade.
  - id: parity
    when: "brent_wti_spread < 1.5"
    says: >
      The Brent-WTI spread has collapsed toward parity — US export capacity has caught up with shale
      supply, or a global demand shock has hit both benchmarks alike. The location arbitrage is gone.
charts:
  - id: "Crude oil: nominal price vs real (inflation-stripped)"
    role: outcome
    chart_type: series
    color_job: categorical
    insight: "deflating WTI by CPI shows the real cost of energy across decades — 2008's real peak dwarfs later nominal highs, and today's price is well below its real-2008 level even as the nominal number looks large"
    data_contract:
      kind: series
      ylabel: "$/bbl"
      series:
        - {label: "WTI (nominal $)", from: "input:crude.level"}
        - {label: "WTI (real, ~today's $)", from: "output:real_wti"}
  - id: "The Brent-WTI location spread over time"
    role: outcome
    chart_type: gap_series
    color_job: diverging
    interpretation: brent_premium
    pos_label: "Brent premium (US glut / export bottleneck)"
    neg_label: "WTI premium (rare)"
    insight: "the seaborne-vs-landlocked premium — the 2011-2014 shale glut blew it out past $20, then US export capacity and the 2020 shock compressed it back toward parity"
    data_contract:
      kind: gap_series
      ylabel: "$/bbl"
      label: "Brent - WTI"
      minuend: "output:brent_wti_spread"
  - id: "Oil-to-gas ratio (crude vs gas relative value)"
    role: outcome
    chart_type: series
    color_job: sequential
    insight: "crude priced in gas — the shale gas glut drove the ratio far above its ~6-10x energy-equivalent parity, the clean read on oil-vs-gas that a single price line cannot show (the 2012 and 2020 spikes are gas collapsing, not oil soaring)"
    data_contract:
      kind: series
      ylabel: "WTI / Henry Hub"
      series:
        - {label: "oil-to-gas ratio", from: "output:oil_gas_ratio"}
  - id: "Crude oil momentum (12-month trailing return)"
    role: consequence
    chart_type: gap_series
    color_job: diverging
    pos_label: "uptrend (reflation)"
    neg_label: "downtrend (demand shock / glut)"
    insight: "time-series momentum (Moskowitz-Ooi-Pedersen) — the sign of the 12-month return is the tradable regime; the deep-negative troughs mark 2008, the 2014-16 shale price war, and the 2020 demand collapse"
    data_contract:
      kind: gap_series
      ylabel: "12m return (%)"
      label: "WTI 12m momentum"
      minuend: "input:crude_mom.level"
