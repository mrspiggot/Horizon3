model_id: credit_spread_regime
name: "Credit spread regime (HY as a state)"
family: credit
persona: credit_investor
grounded_in: [longstaff-credit-spreads]
low_dimensional_exception: true   # one spread (HY OAS) read as a full §10 state
spec:
  equations: "read HY OAS as a §10 state: level, direction (5w change), z-score; regime calm/elevated/stressed"
history: {start: "2025-07-10", end: "2026-07-09", cadence: weekly}
inputs:
  - {id: hy, series_id: BAMLH0A0HYM2, db_source: fred, state: level, step: 5, context_window: 120}
execution:
  implemented_by: unified_market_data.analysis.credit_analytics.credit_stress
  args: {level_pct: hy.level, direction: hy.direction, zscore: hy.zscore}
outputs:
  - {name: level_pct, unit: "%", meaning: "HY OAS level"}
  - {name: zscore, unit: "sigma", meaning: "HY OAS vs its own history"}
interpretations:
  - id: stress_building
    when: "zscore > 1.0"
    says: "HY spreads are more than 1 sigma wide vs their own recent range — credit stress is building."
charts:
  - id: "HY OAS level"
    chart_type: series
    color_job: sequential
    interpretation: stress_building
    insight: "the high-yield spread through time — the credit fear gauge"
    data_contract:
      kind: series
      ylabel: "HY OAS (%)"
      series:
        - {label: "HY OAS", from: "input:hy.level"}
  - id: "HY spread vs its own range (z-score)"
    chart_type: series
    color_job: diverging
    insight: "how extreme today's spread is vs its recent history"
    data_contract:
      kind: series
      ylabel: "z-score"
      zero_line: true
      series:
        - {label: "HY OAS z-score", from: "input:hy.zscore"}
  - id: "Spread momentum (5-week change)"
    chart_type: series
    color_job: diverging
    insight: "is credit widening or tightening — the first derivative"
    data_contract:
      kind: series
      ylabel: "5-week change (pp)"
      zero_line: true
      series:
        - {label: "HY 5w change", from: "input:hy.direction"}
  - id: "Where HY sits in its distribution"
    chart_type: series
    color_job: sequential
    insight: "the percentile of today's HY spread vs its recent range"
    data_contract:
      kind: series
      ylabel: "percentile"
      series:
        - {label: "HY percentile", from: "input:hy.percentile"}
