# Persona article stubs — each = title + <150-word summary (grounded in executed outputs) + the
# selected insight charts. summary_template is Python .format()'d with {model_id.output_name} (and
# {model_id.input_id}) filled from each model's LATEST ModelRun. The prose is authored; every number
# is injected from execution.
personas:
  central_bank_policymaker:
    name: "Central-bank policymaker"
    decision: "Set the policy rate."
    title: "The Fed versus its own rulebook: how far behind the curve?"
    models: [reaction_function, policy_stance, recession_probability]
    stub_charts:
      - [reaction_function, "The policy gap: Taylor '93 minus funds"]
      - [reaction_function, "Taylor-rule fan vs the funds rate"]
      - [policy_stance, "Policy stance vs r* (restrictive above 0)"]
      - [recession_probability, "The term spread (10y - 3m)"]
    summary_template: >
      Hand a central banker their own toolkit and run it against the data, and a gap opens between
      what the rules prescribe and where policy actually sits. The 1993 Taylor rule now calls for
      {reaction_function.taylor_1993}% while the funds rate is {reaction_function.policy}% — the Fed
      swung from roughly nine points behind the rule at the 2022 inflation peak to about neutral by
      2024, and is drifting behind again as core PCE re-firms to {reaction_function.cpi}%. Strip out
      expected inflation and the ex-ante real policy rate is {policy_stance.real_rate_exante_pct}%, a
      stance of {policy_stance.stance_pct}pp against a ~0.7% neutral rate. The yield curve, read
      through the Estrella-Mishkin probit, puts the twelve-month recession probability at
      {recession_probability.prob_12m} on a 0-to-1 scale. Three published models, one reading: policy
      is easing back toward the rule even as the curve stops flashing alarm.

  macro_rates_trader:
    name: "Macro rates trader"
    decision: "Position the duration / swap book ahead of events."
    title: "What is really in the 10-year: expectations, or risk premium?"
    models: [term_premium_decomposition, term_premium_curve, expectations_path]
    stub_charts:
      - [term_premium_decomposition, "The 10Y, split: expectations + term premium"]
      - [term_premium_decomposition, "The term premium alone"]
      - [term_premium_curve, "TP-curve slope (10Y - 2Y)"]
      - [expectations_path, "Expectations-curve slope (10Y - 2Y)"]
    summary_template: >
      A 10-year Treasury yield is two things at once, and a rates trader has to know which is moving.
      The ACM decomposition splits today's {term_premium_decomposition.fitted_yield_pct}% fitted 10-year
      into {term_premium_decomposition.expectations_pct}% of expected average short rate and just
      {term_premium_decomposition.term_premium_pct}pp of term premium — only
      {term_premium_decomposition.tp_share} of the yield is compensation for duration risk. That
      premium is thin: the market is being paid little to own the long end. Across tenors the
      term-premium curve slope (10s minus 2s) is {term_premium_curve.slope}pp, while the expectations
      curve slope is {expectations_path.slope}pp — the shape of the path the market prices. Duration
      here is an expectations bet, not a risk-premium one; the trade is in the path, not the premium.

