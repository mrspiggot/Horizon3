# Persona article stubs — each = title + <150-word summary (grounded in executed outputs) + the
# selected insight charts. summary_template is Python .format()'d with {model_id.output_name} (and
# {model_id.input_id}) filled from each model's LATEST ModelRun. The prose is authored; every number
# is injected from execution.
personas:
  central_bank_policymaker:
    name: "Central-bank policymaker"
    decision: "Set the policy rate."
    title: "The Fed versus its own rulebook: how far behind the curve?"
    models: [reaction_function, policy_stance, recession_probability, phillips_curve]
    stub_charts:
      - [phillips_curve, "The Phillips curve (unemployment vs inflation)"]
      - [reaction_function, "The rule's outcome — the prescription fan"]
      - [reaction_function, "The consequence — how far the Fed is from its own rule"]
      - [recession_probability, "Recession probability, 12m ahead"]
    summary_template: >
      Hand a central banker their own toolkit and run it against the data, and a gap opens between
      what the rules prescribe and where policy actually sits. The 1993 Taylor rule now calls for
      {reaction_function.taylor_1993}% while the funds rate is {reaction_function.policy}% — the Fed
      swung from roughly nine points behind the rule at the 2022 inflation peak to about neutral by
      2024, and is drifting behind again as core PCE re-firms to {reaction_function.cpi}%. Strip out
      expected inflation and the ex-ante real policy rate is {policy_stance.real_rate_exante_pct}%, a
      stance of {policy_stance.stance_pct}pp against a ~0.7% neutral rate. The yield curve, read
      through the Estrella-Mishkin probit, puts the twelve-month recession probability at
      {recession_probability.prob_12m} on a 0-to-1 scale. Behind all of it sits the Phillips curve: at
      {phillips_curve.unemployment_pct}% unemployment and {phillips_curve.inflation_pct}% inflation the
      economy is a warm point on a trade-off whose sixty-year scatter is, tellingly, flat — Friedman's
      vertical long-run curve — so the misery index reads {phillips_curve.misery_index}%. Four published
      models, one reading: policy is easing back toward the rule even as the curve stops flashing alarm.

  macro_rates_trader:
    name: "Macro rates trader"
    decision: "Position the duration / swap book ahead of events."
    title: "What is really in the 10-year: expectations, or risk premium?"
    models: [term_premium_surface, term_premium_decomposition, term_premium_curve, expectations_path]
    stub_charts:
      - [term_premium_surface, "Term-premium surface (tenor x time)"]
      - [term_premium_decomposition, "Term-premium share of the yield"]
      - [term_premium_decomposition, "The 10Y, split: expectations + term premium"]
      - [expectations_path, "Expectations-curve slope (10Y - 2Y)"]
    summary_template: >
      A 10-year Treasury yield is two things at once, and a rates trader has to know which is moving.
      The ACM decomposition splits today's {term_premium_decomposition.fitted_yield_pct}% fitted 10-year
      into {term_premium_decomposition.expectations_pct}% of expected average short rate and just
      {term_premium_decomposition.term_premium_pct}pp of term premium — only
      {term_premium_decomposition.tp_share} of the yield is compensation for duration risk. That share
      is the story of the era: the fat, positive term premium of the 2000s — more than half the yield —
      bled away through the QE years and turned outright negative after 2015, so for a stretch investors
      paid to lend long rather than being paid; it has only partly rebuilt. Across tenors the
      term-premium curve slope (10s minus 2s) is {term_premium_curve.slope}pp, while the expectations
      curve slope is {expectations_path.slope}pp — the shape of the path the market prices. Duration
      here is an expectations bet, not a risk-premium one; the trade is in the path, not the premium.

  volatility_trader:
    name: "Volatility / derivatives trader"
    decision: "Position the vol book (sell premium, own tails, trade the curve)."
    title: "Getting paid to sell fear: is the vol premium worth the tail?"
    models: [variance_risk_premium, vol_term_structure, garch_volatility, return_distribution]
    stub_charts:
      - [garch_volatility, "GARCH(1,1) forecast vs the market's implied"]
      - [garch_volatility, "The vol risk premium over the model (implied - GARCH)"]
      - [return_distribution, "The Pearson diagram (skewness² vs kurtosis)"]
      - [return_distribution, "Fat tails over time (excess kurtosis)"]
    summary_template: >
      Volatility is the rare asset that usually sells for more than it costs to cover, and the
      variance risk premium is the fee. Right now implied vol (VIX) is {variance_risk_premium.implied_vol_pct}
      against realized SPX vol of {variance_risk_premium.realized_vol_pct} — a premium of
      {variance_risk_premium.vrp_vol_pts} vol points to whoever sells it. But realized is backward-looking;
      the sharper test is a fitted forecast. A GARCH(1,1) model (Bollerslev 1986) estimated on the S&P's
      own return history puts conditional vol at {garch_volatility.garch_vol_pct}, so the market is charging
      {garch_volatility.model_premium_pts} vol points ABOVE the model — the premium measured over a real
      forecast, not just trailing realized. The term structure sets the backdrop: the six-month-minus-one-month
      slope is {vol_term_structure.slope} points, contango when positive (calm, carry-friendly) and
      backwardation when negative (stress). And the tail the book actually carries: the S&P return
      distribution sits at kurtosis {return_distribution.kurtosis} against the Normal's 3, with skewness
      {return_distribution.skewness} — persistently fat-tailed and negatively skewed (the Pearson diagram
      shows it living well above the Normal), so a Gaussian VaR understates exactly the moves that blow up
      a short-vol book. Four reads, one trade: harvest the premium while the model says options are rich
      and the curve is calm, and respect the tail — GARCH overshooting implied and kurtosis climbing are
      the twin signatures, at COVID and 2022, that realized is about to outrun the price of vol.

  credit_investor:
    name: "Credit investor"
    decision: "Allocate across the quality ladder (IG / HY / EM)."
    title: "Down the quality ladder: what is the market paying you to take default risk?"
    models: [credit_quality_ladder, oas_implied_default, credit_excess_bond_premium]
    stub_charts:
      - [credit_quality_ladder, "The credit spread ladder (quality x time)"]
      - [credit_excess_bond_premium, "The excess bond premium (risk appetite)"]
      - [credit_excess_bond_premium, "The credit spread, decomposed (expected default + EBP)"]
      - [oas_implied_default, "HY implied annual default rate"]
    summary_template: >
      Credit is a bet that the spread you are paid exceeds the losses you will take. Today the ladder
      runs IG at {credit_quality_ladder.ig}%, high-yield at {credit_quality_ladder.hy}% and emerging
      markets at {credit_quality_ladder.em}% option-adjusted spread — so going down from investment
      grade to high-yield pays an extra {credit_quality_ladder.hy_ig} points. Invert that HY spread
      through the credit triangle and the market is pricing a {oas_implied_default.annual_pd_pct}%
      annual default rate at 40% recovery. But the sharper question is WHY the spread is where it is:
      Gilchrist-Zakrajšek split it into compensation for expected default ({credit_excess_bond_premium.expected_default}%)
      and the excess bond premium ({credit_excess_bond_premium.ebp}%) — the risk-appetite residual that
      drove the 2008 and 2020 spikes and leads the real economy. One reading: with the EBP where it is,
      the down-in-quality premium is being paid grudgingly and the compensation for default risk is thin.

  equity_multiasset_pm:
    name: "Equity / multi-asset PM"
    decision: "Set cross-asset risk exposure."
    title: "Reading the whole tape: are financial conditions really as easy as they feel?"
    models: [financial_conditions, risk_premia_ff89, gold_real_yield, cross_asset_vol_surface]
    stub_charts:
      - [cross_asset_vol_surface, "The cross-asset volatility surface (asset class x time)"]
      - [financial_conditions, "The subindices as a heatmap (component x time)"]
      - [risk_premia_ff89, "The yield curve as a recession signal"]
      - [gold_real_yield, "Gold's dislocation from the real-yield model"]
      - [gold_real_yield, "Gold vs the inverse of real yields"]
    summary_template: >
      A multi-asset PM reads the whole tape at once, not one screen. The Chicago Fed's published
      National Financial Conditions Index — the first factor of a 105-indicator panel, used directly
      rather than a homemade proxy — reads {financial_conditions.nfci} sigma, positive being tighter
      than average. The compensation for risk comes from the Fama-French (1989) premia: the default
      spread (Baa - 10y) at {risk_premia_ff89.def_spread}% and the term spread (10y - 2y) at
      {risk_premia_ff89.term_spread}% — both are the published countercyclical predictors of forward
      returns, widest in recessions and thinnest late-cycle, with the curve's sign the most reliable
      recession lead. And gold, read as Erb-Harvey's real-yield instrument, sits {gold_real_yield.dislocation_z}
      sigma from its real-yield-implied level: a positive dislocation is a fear / official-flow premium
      the rates model cannot explain. One reading: set cross-asset risk from the compensation on offer
      (the FF89 premia) and the conditions backdrop (NFCI), and use gold's dislocation as the haven tell.

  commodity_analyst:
    name: "Commodity analyst"
    decision: "Position across the commodity complex (energy / metals / ags)."
    title: "What the energy complex says about growth and inflation"
    # Refocused to the energy leg: WTI/Brent/Henry Hub have deep FRED history (2000+); the metals/ags
    # legs (copper/gold/corn) are ~1yr in the DB after the Yahoo 429 and await the deferred infra fix
    # that unblocks their deep backfill. Restore [copper_gold_growth, commodity_momentum] then.
    models: [energy_complex, commodity_momentum]
    stub_charts:
      - [energy_complex, "Crude oil: nominal price vs real (inflation-stripped)"]
      - [energy_complex, "The Brent-WTI location spread over time"]
      - [energy_complex, "Oil-to-gas ratio (crude vs gas relative value)"]
      - [energy_complex, "Crude oil momentum (12-month trailing return)"]
    summary_template: >
      Commodities are the economy's cleanest real-time read on growth and inflation, and the energy
      complex rewards analysis over the quoted price. Deflate WTI by CPI and today's ${energy_complex.crude}
      is about ${energy_complex.real_wti} in current money — barely a third of its June-2008 real peak near
      $206; in real terms, energy is cheap. The Brent-WTI location spread, which blew out past $27 in 2011
      as landlocked US shale glutted the Gulf, has collapsed to essentially zero ({energy_complex.brent_wti_spread}):
      export capacity caught up and the decade-long infrastructure trade is over. Crude now costs
      {energy_complex.oil_gas_ratio} times Henry Hub gas, far above the 8-to-10x energy-equivalent parity of
      the 2000s — the shale gas glut, not oil strength. And 12-month momentum, positive now, is the regime
      dial: its -81% trough in April 2020 marked the demand collapse. One reading: real energy is cheap, the
      location arbitrage is dead, and gas is the value leg of the complex.

  corporate_treasurer:
    name: "Corporate treasurer"
    decision: "Time and structure the firm's funding."
    title: "The cost of money: is now the time to term out debt?"
    models: [funding_cost, real_funding, funding_quality]
    stub_charts:
      - [funding_cost, "All-in funding cost over time"]
      - [real_funding, "The real-funding cycle"]
      - [funding_quality, "The credit-quality funding premium (HY - IG)"]
      - [funding_cost, "Rates vs credit — what is driving the cost"]
    summary_template: >
      A treasurer's job is to borrow when money is cheap, so the question is always: is it? All-in
      fixed investment-grade funding sits at {funding_cost.all_in_pct}% — {funding_cost.risk_free_pct}%
      of risk-free rate plus {funding_cost.credit_oas_pct} points of credit spread, so the cost is a
      rates story far more than a company-credit one. Strip out expected inflation and the REAL cost of
      that debt is {real_funding.real_funding}% — the number that actually matters for whether to
      borrow now or wait. Down the quality ladder, a sub-investment-grade issuer pays an extra
      {funding_quality.quality_premium_pct} points, thin by historical standards, so the window for
      weaker credits is open. One reading: nominal funding is rates-driven and the real cost is
      moderate; if the firm needs term debt, the credit door is open and the rate is the swing factor.


  economist_forecaster:
    name: "Economist / forecaster"
    decision: "Read the business cycle — call growth, jobs and recession."
    title: "The labour market as a business-cycle instrument: growth, jobs, and the recession call"
    models: [okun_law, beveridge_curve, sahm_rule]
    stub_charts:
      - [okun_law, "Okun's Law (GDP growth vs change in unemployment)"]
      - [beveridge_curve, "The Beveridge curve (vacancies vs unemployment)"]
      - [sahm_rule, "Headroom to the recession trigger"]
      - [beveridge_curve, "Labour-market tightness (V/U)"]
    summary_template: >
      The labour market is the cleanest read on the business cycle, and three canonical relationships
      turn it into a forecast. Okun's Law ties output to jobs: real GDP is growing
      {okun_law.gdp_growth_pct}% year-on-year and unemployment has moved {okun_law.unemployment_change_pp}
      points over the year, the tight negative link that makes a growth call a jobs call. The Beveridge
      curve reads tightness: at {beveridge_curve.unemployment_pct}% unemployment with a
      {beveridge_curve.vacancy_rate_pct}% vacancy rate there are {beveridge_curve.tightness} openings per
      unemployed worker — and the curve's post-2020 outward shift warns that matching efficiency
      deteriorated. And the Sahm rule gives the real-time recession call: the 3-month unemployment
      average sits {sahm_rule.sahm_gap_pp}pp above its recent low, {sahm_rule.headroom_pp}pp of headroom
      to the 0.5-point trigger that has flagged every recession since 1970. One reading: growth and jobs
      are consistent, the labour market is off its extreme tightness, and the recession trigger is close
      but not yet tripped.

  global_macro_strategist:
    name: "Global macro strategist"
    decision: "Compare the major economies and position across them."
    title: "The major economies, side by side: who is tight, who is slowing, who is reflating"
    models: [economies_scorecard, phillips_curve, sahm_rule]
    stub_charts:
      - [economies_scorecard, "The real policy rate vs the growth pulse"]
      - [economies_scorecard, "The five macro readings today"]
    summary_template: >
      Read across the majors, the same five indicators tell four different stories. Headline inflation
      runs at {economies_scorecard.inflation_pct}% against a {economies_scorecard.policy_rate_pct}%
      policy rate — a real stance of {economies_scorecard.real_policy_rate_pct}% — while the OECD leading
      indicator sits at {economies_scorecard.leading_indicator}, unemployment at
      {economies_scorecard.unemployment_pct}% and the 10y at {economies_scorecard.long_yield_pct}%. The
      cross-country scorecard puts each economy's inflation, jobs, rates and growth pulse side by side, so
      the divergence between them — not any single number — is the position.

  ecb_watcher:
    name: "ECB / euro-area strategist"
    decision: "Read the euro-area cycle and the ECB's stance."
    title: "The euro area: how tight is the ECB, and is the Bund paying you to wait?"
    models: [monetary_stance_lite, real_yield_term, economies_scorecard]
    stub_charts:
      - [monetary_stance_lite, "The real policy rate vs neutral"]
      - [real_yield_term, "The curve slope (10y minus policy)"]
      - [economies_scorecard, "The five macro readings today"]
    summary_template: >
      The euro area sits with the ECB's real policy rate at {monetary_stance_lite.real_policy_rate_pct}% —
      {monetary_stance_lite.stance_vs_neutral_pp}pp from a neutral real rate — while the Bund's real 10y
      yield is {real_yield_term.real_long_yield_pct}% and the curve slope {real_yield_term.curve_slope_pp}pp.
      Growth reads through unemployment at {economies_scorecard.unemployment_pct}% and inflation at
      {economies_scorecard.inflation_pct}%. The stance and the curve together say how much room the ECB has,
      and whether duration compensates the holder.

  uk_macro:
    name: "UK macro strategist"
    decision: "Read the UK cycle — labour, inflation and the Bank of England."
    title: "The UK: a tight labour market, sticky inflation, and how restrictive the Bank really is"
    models: [sahm_rule, phillips_curve, monetary_stance_lite]
    stub_charts:
      - [sahm_rule, "Headroom to the recession trigger"]
      - [phillips_curve, "The Phillips curve (unemployment vs inflation)"]
      - [monetary_stance_lite, "The real policy rate vs neutral"]
    summary_template: >
      The UK labour market leaves the Sahm rule {sahm_rule.headroom_pp}pp of headroom to its recession
      trigger, with unemployment at {phillips_curve.unemployment_pct}% against {phillips_curve.inflation_pct}%
      inflation on a Phillips curve that has flattened. The Bank of England's real policy rate sits at
      {monetary_stance_lite.real_policy_rate_pct}%, {monetary_stance_lite.stance_vs_neutral_pp}pp from
      neutral — genuinely restrictive if inflation keeps falling, less so if it sticks.

  boj_watcher:
    name: "Japan rates strategist"
    decision: "Read Japan's exit from ultra-low rates."
    title: "Japan's exit: the real long rate, the curve, and where the cycle stands"
    models: [real_yield_term, economies_scorecard, phillips_curve]
    stub_charts:
      - [real_yield_term, "The real 10y yield"]
      - [economies_scorecard, "The five macro readings today"]
      - [phillips_curve, "The Phillips curve (unemployment vs inflation)"]
    summary_template: >
      Japan's real 10y yield is {real_yield_term.real_long_yield_pct}% with a curve slope of
      {real_yield_term.curve_slope_pp}pp as the BoJ inches its policy rate up from zero. Inflation runs at
      {economies_scorecard.inflation_pct}% and unemployment at {economies_scorecard.unemployment_pct}% — low
      by any standard — while the Phillips curve reads {phillips_curve.inflation_pct}% inflation against
      {phillips_curve.unemployment_pct}% unemployment. The question is whether the exit is real or stalls.
