model_id: vol_term_structure
name: "Volatility term structure (VIX curve)"
family: vol
persona: volatility_trader
grounded_in: [carr-wu-vrp]
method: data-direct
method_note: "the published VIX term-structure curve"
spec:
  equations: "the VIX curve (9d/1m/3m/6m); slope = VIX6M - VIX1M (>0 contango, <0 backwardation)"
# Vol complex sourced from Cboe (deep, un-throttled) — not Yahoo. All four legs exist from
# 2009-10 (VIX3M is the shortest history, from 2009-09-18). Widened from a 1yr Yahoo snapshot.
# history.start narrowed 2009-10-01 -> 2011-01-03 (2026-07-16, audit `covered` axis): VIX9D begins
# 2011-01 and the model needs all four tenors, so the curve genuinely cannot start earlier — VIX3M
# (2009-09), VIX6M (2008-01) and VIX (1990) reach further back but cannot make a curve alone.
# This ask was also poisoning the writer: writer.py computes its HISTORY-firewall boundary as
# min(starts) across a persona's models, so "2009-10" told the LLM every volatility_trader chart
# began in 2009 — licensing prose about episodes that were never on them.
history: {start: "2011-01-03", end: "2026-07-10", cadence: weekly}
inputs:
  - {id: vix9d, series_id: "VIX9D", db_source: cboe, state: level, context_window: 63}
  - {id: vix, series_id: "VIX", db_source: cboe, state: level, context_window: 63}
  - {id: vix3m, series_id: "VIX3M", db_source: cboe, state: level, context_window: 63}
  - {id: vix6m, series_id: "VIX6M", db_source: cboe, state: level, context_window: 63}
execution:
  implemented_by: unified_market_data.analysis.vol_analytics.vol_term
  args: {v9d: vix9d.level, v1m: vix.level, v3m: vix3m.level, v6m: vix6m.level}
outputs:
  - {name: vix9d, unit: "%", meaning: "9-day implied vol"}
  - {name: vix1m, unit: "%", meaning: "1-month implied vol (VIX)"}
  - {name: vix3m, unit: "%", meaning: "3-month implied vol"}
  - {name: vix6m, unit: "%", meaning: "6-month implied vol"}
  - {name: slope, unit: "vol pts", meaning: "VIX6M - VIX1M; >0 contango, <0 backwardation"}
interpretations:
  - id: backwardation
    when: "slope < 0"
    says: "The vol curve is in backwardation — near-term fear exceeds long-term; the market is stressed now."
charts:
  - id: "The implied-vol surface (tenor x time)"
    role: outcome
    chart_type: heatmap
    color_job: sequential
    interpretation: backwardation
    insight: "the ENTIRE VIX term structure across the year — spikes flash across the front, calm sits long"
    data_contract:
      kind: heatmap
      cbar_label: "implied vol (%)"
      rows:
        - {label: "9d", from: "output:vix9d"}
        - {label: "1m", from: "output:vix1m"}
        - {label: "3m", from: "output:vix3m"}
        - {label: "6m", from: "output:vix6m"}
  - id: "The vol curve: now vs 3 months ago"
    role: outcome
    chart_type: curve_snapshot
    color_job: categorical
    insight: "the shape of implied vol across tenors and how it shifted — contango vs backwardation at a glance"
    data_contract:
      kind: curve_snapshot
      ylabel: "implied vol (%)"
      xlabel: "tenor"
      tenor_labels: ["9d", "1m", "3m", "6m"]
      refs: ["output:vix9d", "output:vix1m", "output:vix3m", "output:vix6m"]
      lookbacks:
        - {label: "now", k: 0, style: solid}
        - {label: "3 months ago", k: 13, style: faded}
  - id: "Term-structure slope (6m - 1m)"
    role: consequence
    chart_type: gap_series
    color_job: diverging
    interpretation: backwardation
    insight: "contango (calm) vs backwardation (stress) through time"
    pos_label: "contango — carry-friendly for a seller"
    neg_label: "backwardation — the stress signal"
    data_contract:
      kind: gap_series
      ylabel: "vol points"
      label: "VIX6M - VIX1M"
      minuend: "output:vix6m"
      subtrahend: "output:vix1m"
  - id: "The vol curve today"
    role: input
    chart_type: bar
    color_job: sequential
    insight: "the current shape of the implied-vol term structure"
    data_contract:
      kind: named_values
      ylabel: "implied vol (%)"
      labels: ["9d", "1m", "3m", "6m"]
      values: ["output:vix9d", "output:vix1m", "output:vix3m", "output:vix6m"]
