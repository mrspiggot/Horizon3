model_id: funding_quality
name: "Funding by credit quality (IG vs HY)"
family: credit
persona: corporate_treasurer
grounded_in: [longstaff-credit-spreads, hatzius-fci]
method: arithmetic
method_note: "SLOP-ADJACENT: IG/HY all-in + premium (arithmetic)"
spec:
  equations: "ig_all_in = rf + IG OAS; hy_all_in = rf + HY OAS; quality premium = hy - ig"
history: {start: "2025-08-01", end: "2026-07-09", cadence: weekly}
inputs:
  - {id: rf, series_id: DGS5, db_source: fred, state: level, context_window: 250}
  - {id: ig, series_id: BAMLC0A0CM, db_source: fred, state: level, context_window: 250}
  - {id: hy, series_id: BAMLH0A0HYM2, db_source: fred, state: level, context_window: 250}
execution:
  implemented_by: unified_market_data.analysis.treasury_analytics.funding_quality
  args: {risk_free_pct: rf.level, ig_oas_pct: ig.level, hy_oas_pct: hy.level}
outputs:
  - {name: ig_all_in_pct, unit: "%", meaning: "all-in IG funding cost"}
  - {name: hy_all_in_pct, unit: "%", meaning: "all-in HY funding cost"}
  - {name: quality_premium_pct, unit: "%", meaning: "extra funding cost of sub-IG credit (HY - IG)"}
interpretations:
  - id: quality_cheap
    when: "quality_premium_pct < 2.0"
    says: "The premium for sub-IG funding is thin — the market is barely penalising weaker credit; a window for HY issuers."
charts:
  - id: "All-in funding: IG vs HY"
    chart_type: series
    color_job: categorical
    insight: "what each credit quality pays to fund, through time"
    data_contract:
      kind: series
      ylabel: "all-in funding (%)"
      series:
        - {label: "IG all-in", from: "output:ig_all_in_pct"}
        - {label: "HY all-in", from: "output:hy_all_in_pct"}
  - id: "The credit-quality funding premium (HY - IG)"
    chart_type: gap_series
    color_job: diverging
    interpretation: quality_cheap
    insight: "the extra cost of being a weaker credit — the window for sub-IG issuance"
    data_contract:
      kind: gap_series
      ylabel: "percentage points"
      label: "HY - IG all-in"
      minuend: "output:hy_all_in_pct"
      subtrahend: "output:ig_all_in_pct"
  - id: "The risk-free anchor"
    chart_type: series
    color_job: sequential
    insight: "the common 5Y risk-free rate under both funding costs"
    data_contract:
      kind: series
      ylabel: "%"
      series:
        - {label: "5Y risk-free", from: "input:rf.level"}
  - id: "Funding by quality today"
    chart_type: bar
    color_job: sequential
    insight: "the current all-in cost at each credit quality"
    data_contract:
      kind: named_values
      ylabel: "all-in funding (%)"
      labels: ["IG all-in", "HY all-in", "premium"]
      values: ["output:ig_all_in_pct", "output:hy_all_in_pct", "output:quality_premium_pct"]
