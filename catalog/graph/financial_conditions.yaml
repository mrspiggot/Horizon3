model_id: financial_conditions
name: "Financial conditions (published Chicago Fed NFCI)"
family: equity
persona: equity_multiasset_pm
grounded_in: [hatzius-fci]
method: published
method_note: "consumes the published Chicago Fed NFCI + subindices directly"
spec:
  equations: "the PUBLISHED NFCI (Brave-Butters/Hatzius: first factor of a 105-indicator panel via Kalman filter) and its risk/credit/leverage subindices; >0 = tighter than average"
history: {start: "1971-01", end: "2026-07-03", cadence: weekly}
inputs:
  - {id: risk, series_id: NFCIRISK, db_source: fred, state: level, context_window: 200}
  - {id: credit, series_id: NFCICREDIT, db_source: fred, state: level, context_window: 200}
  - {id: leverage, series_id: NFCILEVERAGE, db_source: fred, state: level, context_window: 200}
  - {id: nfci, series_id: NFCI, db_source: fred, state: level, context_window: 200}
execution:
  implemented_by: unified_market_data.analysis.cross_asset.nfci_reading
  args: {nfci: nfci.level, risk: risk.level, credit: credit.level, leverage: leverage.level}
outputs:
  - {name: nfci, unit: "sigma", meaning: "National Financial Conditions Index; >0 tighter than average"}
  - {name: risk, unit: "sigma", meaning: "risk subindex (volatility/funding stress)"}
  - {name: credit, unit: "sigma", meaning: "credit subindex (spreads/lending)"}
  - {name: leverage, unit: "sigma", meaning: "leverage subindex (debt/equity)"}
interpretations:
  - id: tight
    when: "nfci > 0.2"
    says: "Financial conditions are tighter than average — the cross-asset complex is applying the brakes even before the Fed does."
charts:
  - id: "The NFCI's published subindices — risk / credit / leverage"
    role: input
    chart_type: series
    color_job: categorical
    insight: "the three components the Chicago Fed decomposes conditions into — the model's inputs"
    data_contract:
      kind: series
      ylabel: "subindex (sigma)"
      zero_line: true
      series:
        - {label: "risk", from: "output:risk"}
        - {label: "credit", from: "output:credit"}
        - {label: "leverage", from: "output:leverage"}
  - id: "The subindices as a heatmap (component x time)"
    role: input
    chart_type: heatmap
    color_job: diverging
    insight: "where and when each component tightened (red) or loosened (blue) — the whole decomposition at once"
    data_contract:
      kind: heatmap
      cbar_label: "subindex (sigma; >0 tight)"
      rows:
        - {label: "risk", from: "output:risk"}
        - {label: "credit", from: "output:credit"}
        - {label: "leverage", from: "output:leverage"}
  - id: "The National Financial Conditions Index (Chicago Fed)"
    role: outcome
    chart_type: series
    color_job: diverging
    interpretation: tight
    insight: "the published index the model outputs — one number for the whole financial system, positive = tight"
    data_contract:
      kind: series
      ylabel: "NFCI (sigma; >0 tight)"
      zero_line: true
      series:
        - {label: "NFCI", from: "output:nfci"}
  - id: "What is driving conditions today"
    role: consequence
    chart_type: bar
    color_job: diverging
    insight: "the current contribution of each subindex to the headline reading — the consequence for positioning"
    data_contract:
      kind: named_values
      ylabel: "sigma"
      labels: ["risk", "credit", "leverage", "NFCI"]
      values: ["output:risk", "output:credit", "output:leverage", "output:nfci"]
