# Underlying bindings — the generalization axis for the VOLATILITY family (parallel to
# jurisdictions.yaml for rates). A vol model is generic over UNDERLYING, not currency: the same
# SABR/SVI smile fit serves SPX equity, BTC/ETH crypto, and SOFR rate vol. USD/SPX is one
# instantiation, never the definition (hard-rule #6, applied to a second axis).
#
# Verified LIVE via MarketDataAPI.get_*_vol_surface (2026-07-10): SPY, BTC, ETH, SOFR return full
# smile+density. Treasury and FX are CODE-READY but options chains are empty ("too thin") — a
# data-acquisition gap (directive #1), documented not bound.

# Role vocabulary (vol family). `surface`/`computed` sources are API/analysis-derived (not a raw
# observations series); the validator treats them as declared (API-verified) rather than DB-checked.
roles:
  implied_vol_surface: {kind: surface,      desc: "Fitted implied-vol smile/surface (SABR+SVI) from the options chain."}
  implied_vol_atm:     {kind: computed,     desc: "ATM implied vol (headline vol level; VIX-type where a series exists)."}
  realized_vol:        {kind: computed, optional: true, desc: "Realized vol of the underlying (historical_vol.compute_log_vol)."}
  spot:                {kind: observations, optional: true, desc: "Underlying spot/level."}

underlyings:
  - id: SPY
    asset_class: equity
    bindings:
      implied_vol_surface: {ref: "equity:SPY", source: surface, note: "get_equity_vol_surface(product=SPY)"}
      implied_vol_atm:     {ref: "^VIX",       source: observations, note: "VIX ≈ SPX 30d ATM implied."}
      realized_vol:        {ref: "SPY",        source: computed, note: "log-return vol from equity_prices."}

  - id: BTC
    asset_class: crypto
    bindings:
      implied_vol_surface: {ref: "crypto:BTC", source: surface, note: "get_crypto_vol_surface(BTC) — Deribit."}
      implied_vol_atm:     {ref: "crypto:BTC", source: computed, note: "ATM from the fitted surface."}
      realized_vol:        {ref: "BTC",        source: computed}

  - id: ETH
    asset_class: crypto
    bindings:
      implied_vol_surface: {ref: "crypto:ETH", source: surface, note: "get_crypto_vol_surface(ETH) — Deribit."}
      implied_vol_atm:     {ref: "crypto:ETH", source: computed}
      realized_vol:        {ref: "ETH",        source: computed}

  - id: SOFR
    asset_class: rates
    bindings:
      implied_vol_surface: {ref: "sofr",       source: surface, note: "get_sofr_vol_surface — CME SR3 options."}
      implied_vol_atm:     {ref: "sofr",       source: computed, note: "ATM Bachelier vol from the SR3 smile."}
      realized_vol:        {ref: "SR3=F",      source: computed, note: "get_sr3_realized_vol."}

  # --- US Treasury option vol (CME options scraped + scheduler-wired, 2026-07-10) ---
  - id: UST2Y
    asset_class: rates
    bindings:
      implied_vol_surface: {ref: "treasury:2Y",  source: surface, note: "get_treasury_vol_surface(2Y) — CME ZT options. Live."}
      implied_vol_atm:     {ref: "treasury:2Y",  source: computed}
      realized_vol:        {ref: "ZT=F",         source: computed}
  - id: UST5Y
    asset_class: rates
    bindings:
      implied_vol_surface: {ref: "treasury:5Y",  source: surface, note: "get_treasury_vol_surface(5Y) — CME ZF options. Live."}
      implied_vol_atm:     {ref: "treasury:5Y",  source: computed}
      realized_vol:        {ref: "ZF=F",         source: computed}
  - id: UST10Y
    asset_class: rates
    bindings:
      implied_vol_surface: {ref: "treasury:10Y", source: surface, note: "get_treasury_vol_surface(10Y) — CME ZN options. Live."}
      implied_vol_atm:     {ref: "treasury:10Y", source: computed}
      realized_vol:        {ref: "ZN=F",         source: computed}

  # --- Acquired but surface not yet fitting (honest follow-ups, deliberately NOT bound) ---
  # UST30Y (ZB): options scraped (146) but ZB FUTURES are not cached (0 contracts) -> surface can't
  #   centre. Fix: add ZB to the CME futures scrape, then bind UST30Y here.
  # FX EURUSD/USDJPY (6E/6J): options scraped (89/82 strikes) + futures cached, but
  #   get_fx_vol_surface mis-centres the fit band ("2 strikes in band") -> an F-centering/band-width
  #   bug in the FX surface fitter. DATA is present; fix the fitter, then bind them here.
