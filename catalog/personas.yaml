# Decision-maker × model join (assessment §05). Many-to-many: a model_id may appear under
# several personas' `uses` lists, but each model's spec lives in exactly one catalog/models/ file.
#
# Deliverable 1 authors the MACRO RATES TRADER end-to-end as the exemplar; the remaining 10
# personas are stubbed here with their §05 model lists and will be fleshed out row by row,
# reusing already-authored model files where they share one (write the USES edge, not a copy).

personas:
  - persona_id: macro_rates_trader
    name: "Macro rates trader"
    decision: "Position the duration / swap book ahead of events."
    uses:
      - ois_curve_construction   # the discount-curve substrate (was mis-named curve_fair_value)
      - ois_implied_path
      - carry_roll_down
      - term_premium_acm
      - curve_pca                 # curve rich/cheap (RV residuals) — the 'fair value' role
      - rate_divergence

  # --- remaining personas: model files not yet authored (row-by-row after the exemplar) ---
  # Shared models already authored above are referenced by id; models with no file yet are
  # listed here as the authoring backlog and will fail `uses`-resolution until written.

  - persona_id: central_bank_policymaker
    name: "Central-bank policymaker"
    decision: "Set the policy rate."
    uses: [reaction_function, output_gap, r_star, phillips_curve, term_premium_acm]  # term_premium_acm shared with macro_rates_trader

  - persona_id: relative_value_fi_trader
    name: "Relative-value FI trader"
    decision: "Spread / basis trades."
    uses: [curve_pca, swap_spread, cross_market_basis, asset_swap]  # curve_pca (butterfly/RV) shared with macro_rates_trader

  - persona_id: corporate_treasurer
    name: "Corporate treasurer"
    decision: "Hedge funding / FX / rates exposure."
    uses: []                   # TODO: cost_of_carry, hedge_ratio, funding_vs_inflation, scenario
    status: pending_authoring

  - persona_id: credit_investor
    name: "Credit investor"
    decision: "Credit allocation."
    uses: []                   # TODO: spread_vs_fundamentals, merton_structural_pd, spread_decomposition
    status: pending_authoring

  - persona_id: fx_trader
    name: "FX trader"
    decision: "Currency positioning."
    uses: [fx_carry, fx_real_rate_differential, ppp_reer]  # generic over currency-PAIR (EURUSD/USDJPY/AUDUSD/USDCHF)

  - persona_id: commodity_analyst
    name: "Commodity analyst"
    decision: "Commodity positioning."
    uses: [commodity_term_structure, crack_spread, supply_demand_balance]  # generic over COMMODITY (CL/HO/RB/NG); crack_spread composite (CRACK321)

  - persona_id: equity_multiasset_pm
    name: "Equity / multi-asset PM"
    decision: "Allocation / valuation."
    uses: []                   # TODO: equity_risk_premium, fed_model, factor_sector, ddm
    status: pending_authoring

  - persona_id: volatility_trader
    name: "Volatility / derivatives trader"
    decision: "Vol positioning."
    uses: [vol_surface, implied_vs_realized, vol_skew, variance_risk_premium]  # generic over UNDERLYING (SPY/BTC/ETH/SOFR)

  - persona_id: event_prediction_trader
    name: "Event / prediction-market trader"
    decision: "Event bets."
    uses: [implied_probability, calibration_bias_correction, fair_value_vs_market]  # generic over EVENT family (KXFED/KXBTC/...)

  - persona_id: economist_forecaster
    name: "Economist / forecaster"
    decision: "Forecast + surprise read."
    uses: [surprise_vs_consensus, regime_detection, nowcast]
