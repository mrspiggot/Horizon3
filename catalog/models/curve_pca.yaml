model_id: curve_pca
name: "Curve factor model (PCA: level / slope / curvature) + rich/cheap"
family: rates
summary: >
  Reduces a yield curve to three orthogonal factors — level, slope, curvature — and reports per-tenor
  fair-value residuals against the fitted factor curve (the rich/cheap 'fair value' signal). GENERIC
  over currency.

generic_over: [currency]
jurisdictions: [US, EU, GB, JP, CH, CA, AU]
implementation_coverage:
  covers: []
  gap: "No PCA/Nelson-Siegel factor model in analysis/ yet — buildable now for all majors. Deliverable 5."

spec:
  form: >
    Principal-component decomposition of the curve (or Nelson-Siegel functional form): the first three
    PCs are level, slope, curvature. Fitted rate per tenor from the factors; residual = observed − fitted.
    (§11 B2.)
  assumptions:
    - "Three factors span the curve to good approximation."
    - "Loadings estimated over a rolling history window."
  params:
    n_factors: 3
    window: "250d"
  references:
    - "docs/assessment/11-model-reference.md#b2"

inputs:
  - role: ois_par_curve
    order: level
    window: "1d"
    horizon: full_curve
    required: true
    note: "Curve levels — the observations the PCA is fit to."
  - role: ois_par_curve
    order: delta
    window: "1d"
    horizon: full_curve
    required: true
    note: "Curve changes — the factor moves (level/slope/curvature shifts)."

outputs:
  - name: "factor_scores"
    unit: "dimensionless"
    note: "Level, slope, curvature scores for the current curve."
  - name: "residual_by_tenor_bp"
    unit: "bp"
    note: "Observed minus factor-fitted rate per tenor; the butterfly/RV rich-cheap signal."

interpretation: >
  "A large curvature move is a different macro signal from a slope move; per-tenor residuals are the
  butterfly/spread rich-cheap signals. This is the 'fair value' role for the rates family."

build_stub: true
