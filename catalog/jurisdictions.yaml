      inflation_target_pct: 2.0
      phillips_u_star_pct: 4.5
      phillips_hot_infl_pct: 3.0
      regime_hot_infl_pct: 2.5
    bindings:
      ois_par_curve:            {ref: "GBP:ois",            source: curve}
      govt_par_curve:           null   # no GBP government curve in curve_snapshots (gilts not scraped)
      overnight_index:          {ref: "BOE_IUDSOIA",        source: observations, note: "SONIA."}
      policy_rate:              {ref: "BOE_IUDBEDR",        source: observations, note: "Bank Rate."}
      overnight_deposit_anchor: {ref: "BOE_IUDSOIA",        source: observations}
      rate_futures_strip:       null   # no SONIA futures strip ingested
      pm_implied_rate:          null
      equity_vol:               null
      unemployment_rate:        {ref: "LRHUTTTTGBM156S",    source: fred, note: "UK harmonised unemployment (OECD), from 1983."}
      headline_cpi:             {ref: "GBRCPIALLMINMEI",    source: fred, note: "UK CPI (OECD), from 1955; yoy = headline inflation."}
      long_yield_10y:           {ref: "IRLTLT01GBM156N",    source: fred, note: "UK 10y gilt benchmark (OECD-harmonised), from 1960."}
      leading_indicator:        {ref: "OECD_CLI_GBR",        source: oecd, note: "OECD CLI, UK."}
      output_gap:               {ref: "OECD_EXP_GAP_GBR",   source: oecd_expanded, note: "OECD EO output gap, UK."}

  - id: JP
    central_bank: "Bank of Japan"
    ccy: JPY
    scope: major
    display_order: 4
    vocab:
      cb_the: "the Bank of Japan"
      cb_title: "The Bank of Japan"
      cb_short: "BoJ"
      policy_rate: "the BoJ policy rate"
      price_index: "CPI inflation"
      benchmark: "the 10-year JGB"
      govt: "JGBs"
      aliases: ["yield curve control", "YCC"]
    calibration:
      r_star_pct: 0.0
      inflation_target_pct: 2.0
      phillips_u_star_pct: 2.5
      phillips_hot_infl_pct: 2.0
      regime_hot_infl_pct: 2.5
    bindings:
      ois_par_curve:            {ref: "JPY:ois",            source: curve}
      govt_par_curve:           {ref: "JPY:government",      source: curve, note: "Present (75 snapshots) — richer than USD govt."}
      overnight_index:          {ref: "JPY:ois",            source: curve, note: "TONAR via OIS front; no standalone fixing series ingested."}
      policy_rate:              {ref: "IRSTCI01JPM156N",     source: observations, note: "BoJ policy proxy (immediate call rate, monthly)."}
      overnight_deposit_anchor: {ref: "JPY:ois",            source: curve}
      rate_futures_strip:       null
      pm_implied_rate:          null
      equity_vol:               null
      unemployment_rate:        {ref: "LRUN64TTJPM156S",    source: fred, note: "Japan harmonised unemployment (OECD), from 1970."}
      # Repointed 2026-07-20: JPNCPIALLMINMEI (fred/OECD) is DEAD — latest 2021-06, ~5yr stale. IMF IFS
      # carries live Japan CPI to 2026-05. The dead binding was silently capping every JP inflation model.
      headline_cpi:             {ref: "IMF_IFS_JP_CPI",     source: imf, note: "Japan CPI (IMF IFS), live to 2026; yoy = headline inflation. Replaces the dead OECD JPNCPIALLMINMEI."}
      long_yield_10y:           {ref: "IRLTLT01JPM156N",    source: fred, note: "Japan 10y JGB benchmark (OECD-harmonised), from 1989."}
      leading_indicator:        {ref: "OECD_CLI_JPN",        source: oecd, note: "OECD CLI, Japan."}
      output_gap:               {ref: "OECD_EXP_GAP_JPN",   source: oecd_expanded, note: "OECD EO output gap, Japan."}

