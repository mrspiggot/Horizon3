# Jurisdiction bindings — the generalization spine (assessment hard-rule #6: generic, not FOMC).
#
# A MODEL is jurisdiction-agnostic. It declares input ROLES (semantic slots: the OIS curve, the
# policy rate, the futures strip, the prediction-market leg...). THIS file binds each role to a
# concrete UMD series for each jurisdiction that has the data. USD/FOMC/Kalshi is ONE instantiation,
# never the definition. The rates family generalises across every G10 OIS curve LCH publishes.
#
# Every ref below was verified present + fresh (2026-07-10) in the live UMD estate. Where a role
# has no standalone series for a jurisdiction, the binding is honest about it (null, or via-curve).

# ---------------------------------------------------------------------------------------------
# Role vocabulary (rates family). A model input references one of these; it never names a series.
roles:
  ois_par_curve:            {kind: curve,        desc: "OIS par-swap curve (curve_snapshots CCY/ois)."}
  govt_par_curve:           {kind: curve,        optional: true, desc: "Government par curve (curve_snapshots CCY/government). Nominal-zero bootstrap = a Deliverable-2 transform. Rich for EUR/JP/CA/CH/AU; SPARSE for USD; absent for GB."}
  swap_par_curve:           {kind: curve,        optional: true, desc: "Swap/IRS par curve (curve_snapshots CCY/irs) — for swap-spread RV (swap − govt). Present for EUR (EURIBOR) + AUD."}
  term_premium_series:      {kind: observations, optional: true, desc: "PUBLISHED per-tenor term premium (data-direct). US = NY Fed ACM ACMTP01..10. Where a CB publishes ACM, no re-estimation is needed."}
  expectations_series:      {kind: observations, optional: true, desc: "PUBLISHED per-tenor risk-neutral/expectations yield. US = NY Fed ACM ACMRNY01..10 (the model's expectations component)."}
  core_inflation:           {kind: observations, optional: true, desc: "Core inflation index (yoy computed = Taylor π). US = PCEPILFE (core PCE)."}
  real_gdp:                 {kind: observations, optional: true, desc: "Real GDP — output-gap numerator. US = GDPC1."}
  potential_gdp:            {kind: observations, optional: true, desc: "Potential real GDP — output-gap denominator. US = GDPPOT. DATE-ALIGN with real_gdp (projections run to 2036)."}
  macro_release:            {kind: computed,     optional: true, desc: "Macro release actual/expected/surprise (macro_events). Surprise-vs-consensus input."}
  macro_indicators:         {kind: computed,     optional: true, desc: "Macro indicator set (growth/inflation/labour) for regime classification."}
  overnight_index:          {kind: observations, desc: "RFR overnight fixing (SOFR/ESTR/SONIA/...)."}
  policy_rate:              {kind: observations, desc: "Central-bank target/effective policy rate."}
  overnight_deposit_anchor: {kind: any,          desc: "Short-end bootstrap anchor (OBFR for US; RFR/curve-front elsewhere)."}
  rate_futures_strip:       {kind: observations, optional: true, desc: "RFR futures strip (e.g. CME SR3). US-rich; sparse elsewhere."}
  pm_implied_rate:          {kind: event,        optional: true, desc: "Prediction-market implied policy rate. Kalshi = US-only."}
  equity_vol:               {kind: observations, optional: true, desc: "Equity vol index for structural-premium terms."}
  credit_oas:               {kind: observations, optional: true, desc: "Investment-grade corporate OAS (option-adjusted spread over govt, bps) — the treasurer's credit funding leg. US = ICE BofA IG (BAMLC0A0CM). HY/EM are separate indices; euro/sterling IG OAS not yet ingested."}

# ---------------------------------------------------------------------------------------------
# Jurisdictions. `scope: major` = the G7-ish OIS majors we instantiate first (user priority:
# generalise beyond USD). EM OIS curves (CLP/CNY/MXN/ZAR/SEK/NOK/NZD/INR/...) exist in
# curve_snapshots as `scope: em` extensions but lack policy/RFR standalone series — documented, not
# yet bound.
jurisdictions:
  - id: US
    central_bank: "Federal Reserve"
    ccy: USD
    scope: major
    bindings:
      ois_par_curve:            {ref: "USD:ois",            source: curve}
      govt_par_curve:           null   # curve_snapshots USD/government has only 2 snapshots — SPARSE, unusable
      term_premium_series:      {ref: "ACMTP*",             source: observations, note: "NY Fed ACM per-tenor term premium (nyfed_acm provider)."}
      expectations_series:      {ref: "ACMRNY*",            source: observations, note: "NY Fed ACM per-tenor risk-neutral/expectations yield."}
      core_inflation:           {ref: "PCEPILFE",           source: observations, note: "Core PCE index; yoy = Taylor π."}
      real_gdp:                 {ref: "GDPC1",              source: observations}
      potential_gdp:            {ref: "GDPPOT",             source: observations, note: "Date-align with real_gdp."}
      macro_release:            {ref: "macro_events",       source: computed, note: "actual/expected/surprise (48 events)."}
      macro_indicators:         {ref: "us_macro",           source: computed, note: "growth/inflation/labour set for regime."}
      overnight_index:          {ref: "SOFR",               source: observations}
      policy_rate:              {ref: "DFF",                source: observations}
      overnight_deposit_anchor: {ref: "OBFR",               source: observations}
      rate_futures_strip:       {ref: "CME_SR3_*",          source: observations}
      pm_implied_rate:          {ref: "KXFED_implied_rate", source: event}
      equity_vol:               {ref: "^VIX",               source: observations}
      credit_oas:               {ref: "BAMLC0A0CM",         source: observations, note: "ICE BofA US IG corporate OAS (bps). HY=BAMLH0A0HYM2, EM=BAMLEMCBPIOAS also ingested."}

  - id: EU
    central_bank: "European Central Bank"
    ccy: EUR
    scope: major
    bindings:
      ois_par_curve:            {ref: "EUR:ois",            source: curve}
      govt_par_curve:           {ref: "EUR:government",      source: curve, note: "Rich (305 snapshots)."}
      swap_par_curve:           {ref: "EUR:irs",             source: curve, note: "EURIBOR IRS."}
      overnight_index:          {ref: "ECB_ESTR_INDEX",     source: observations}
      policy_rate:              {ref: "ECBDFR",             source: observations, note: "Deposit facility rate (ECBMRRFR = main refi alt)."}
      overnight_deposit_anchor: {ref: "ECB_ESTR_INDEX",     source: observations}
      rate_futures_strip:       null   # no ESTR futures strip ingested (Euribor/bund futures only)
      pm_implied_rate:          null   # no ECB prediction market
      equity_vol:               null   # V2X not ingested yet

  - id: GB
    central_bank: "Bank of England"
    ccy: GBP
    scope: major
    bindings:
      ois_par_curve:            {ref: "GBP:ois",            source: curve}
      govt_par_curve:           null   # no GBP government curve in curve_snapshots (gilts not scraped)
      overnight_index:          {ref: "BOE_IUDSOIA",        source: observations, note: "SONIA."}
      policy_rate:              {ref: "BOE_IUDBEDR",        source: observations, note: "Bank Rate."}
      overnight_deposit_anchor: {ref: "BOE_IUDSOIA",        source: observations}
      rate_futures_strip:       null   # no SONIA futures strip ingested
      pm_implied_rate:          null
      equity_vol:               null

  - id: JP
    central_bank: "Bank of Japan"
    ccy: JPY
    scope: major
    bindings:
      ois_par_curve:            {ref: "JPY:ois",            source: curve}
      govt_par_curve:           {ref: "JPY:government",      source: curve, note: "Present (75 snapshots) — richer than USD govt."}
      overnight_index:          {ref: "JPY:ois",            source: curve, note: "TONAR via OIS front; no standalone fixing series ingested."}
      policy_rate:              {ref: "IRSTCI01JPM156N",     source: observations, note: "BoJ policy proxy (immediate call rate, monthly)."}
      overnight_deposit_anchor: {ref: "JPY:ois",            source: curve}
      rate_futures_strip:       null
      pm_implied_rate:          null
      equity_vol:               null

  - id: CH
    central_bank: "Swiss National Bank"
    ccy: CHF
    scope: major
    bindings:
      ois_par_curve:            {ref: "CHF:ois",            source: curve}
      govt_par_curve:           {ref: "CHF:government",      source: curve, note: "Present (75 snapshots)."}
      overnight_index:          {ref: "CHF:ois",            source: curve, note: "SARON via OIS front; no standalone fixing ingested."}
      policy_rate:              {ref: "CHF:ois",            source: curve, note: "SARON via OIS front proxies SNB policy rate; OECD call-rate series discontinued 2024."}
      overnight_deposit_anchor: {ref: "CHF:ois",            source: curve}
      rate_futures_strip:       null
      pm_implied_rate:          null
      equity_vol:               null

  - id: CA
    central_bank: "Bank of Canada"
    ccy: CAD
    scope: major
    bindings:
      ois_par_curve:            {ref: "CAD:ois",            source: curve}
      govt_par_curve:           {ref: "CAD:government",      source: curve, note: "Rich (296 snapshots)."}
      overnight_index:          {ref: "CAD:ois",            source: curve, note: "CORRA via OIS front; no standalone fixing ingested."}
      policy_rate:              {ref: "CAD_POLICY_RATE",    source: observations}
      overnight_deposit_anchor: {ref: "CAD:ois",            source: curve}
      rate_futures_strip:       null
      pm_implied_rate:          null
      equity_vol:               null

  - id: AU
    central_bank: "Reserve Bank of Australia"
    ccy: AUD
    scope: major
    bindings:
      ois_par_curve:            {ref: "AUD:ois",            source: curve}
      govt_par_curve:           {ref: "AUD:government",      source: curve, note: "Present (74 snapshots)."}
      swap_par_curve:           {ref: "AUD:irs",             source: curve, note: "Bills IRS."}
      overnight_index:          {ref: "AUD:ois",            source: curve, note: "AONIA via OIS front; no standalone fixing ingested."}
      policy_rate:              {ref: "IRSTCI01AUM156N",     source: observations, note: "RBA cash rate proxy (immediate call rate, monthly)."}
      overnight_deposit_anchor: {ref: "AUD:ois",            source: curve}
      rate_futures_strip:       null
      pm_implied_rate:          null
      equity_vol:               null
