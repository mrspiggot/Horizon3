    topics: [recession-probability, yield-curve, leading-indicators]
    tier: canonical
    added: "2026-07-11"
    why: "Probit recession model on the 10y-3m term spread (and other financials). Output: recession probability at a horizon. Grounds the regime/recession models."
    superseded_by: null

  - id: hatzius-fci
    title: "Financial Conditions Indexes: A Fresh Look after the Financial Crisis"
    authors: ["Jan Hatzius", "Peter Hooper", "Frederic Mishkin", "Kermit Schoenholtz", "Mark Watson"]
    url: "https://www.nber.org/papers/w16150"
    arxiv_id: null
