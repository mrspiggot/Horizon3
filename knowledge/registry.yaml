# The curated knowledge corpus. Seeded from the references in
# Horizon2/docs/assessment/*.md — the papers that drive our foundational
# principles. Human-curated: curate.py only ever appends `candidate` entries.
#
# schema: papers: [{id, title, authors, url, arxiv_id, local_path, topics[],
#                   tier, added, why, superseded_by, sha256}]
#   tier: canonical  — a paper/official source that drives principles; keep a
#                      physical copy in sources/ and index it.
#         reference  — a guide/blog; indexed from a cached text extract.
#         candidate  — auto-surfaced by curate.py, pending human review.

