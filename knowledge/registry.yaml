    tier: canonical
    added: "2026-07-11"
    why: "Builds a financial-conditions index as the first principal component of a broad panel (rates, spreads, equity/vol, FX, credit). The whole financial cross-section -> one interpretable state."
    superseded_by: null

  - id: banbura-nowcasting
    title: "Nowcasting"
    authors: ["Marta Banbura", "Domenico Giannone", "Lucrezia Reichlin"]
