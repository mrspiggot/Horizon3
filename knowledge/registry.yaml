  # ── Economic models (the substance the corpus grounds) — added 2026-07-11 ──
  - id: taylor-1993-rule
    title: "Discretion versus Policy Rules in Practice"
    authors: ["John B. Taylor"]
    url: "https://web.stanford.edu/~johntayl/Papers/Discretion.PDF"
    arxiv_id: null
    local_path: sources/taylor_1993.pdf
    topics: [reaction-function, monetary-policy, rates]
    tier: canonical
    added: "2026-07-11"
    why: "The canonical central-bank reaction function: i = r* + pi + 0.5(pi-pi*) + 0.5*gap. Inputs: inflation, output gap. Grounds the policymaker/rates reaction-function models."
    superseded_by: null

  - id: hlw-natural-rate
    title: "Measuring the Natural Rate of Interest: International Trends and Determinants"
    authors: ["Kathryn Holston", "Thomas Laubach", "John C. Williams"]
    url: "https://www.frbsf.org/economic-research/files/wp2016-11.pdf"
    arxiv_id: null
    local_path: sources/hlw_r_star_2016.pdf
    topics: [natural-rate, r-star, monetary-policy]
    tier: canonical
    added: "2026-07-11"
    why: "State-space/Kalman estimation of r* jointly with trend growth and the output gap. Inputs: real GDP, inflation, real policy rate. Anchors 'how restrictive is policy vs neutral'."
    superseded_by: null

  - id: estrella-mishkin-recession
    title: "Predicting U.S. Recessions: Financial Variables as Leading Indicators"
    authors: ["Arturo Estrella", "Frederic S. Mishkin"]
    url: "https://www.nber.org/papers/w5379"
    arxiv_id: null
