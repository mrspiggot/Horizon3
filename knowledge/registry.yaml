  - id: acm-linear-regressions
    title: "Pricing the Term Structure with Linear Regressions (ACM)"
    authors: ["Tobias Adrian", "Richard Crump", "Emanuel Moench"]
    url: "https://www.newyorkfed.org/medialibrary/media/research/staff_reports/sr340.pdf"
    arxiv_id: null
